version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - STORAGE=postgres
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/shortener
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql